<html>

<head>
    <script type="text/javascript" language="javascript" src="jsme/jsme.nocache.js"></script>

    <script type="text/javascript">
    function jsmeOnLoad() {
        let container = document.getElementById("jsme_container");

        // If the container is missing, create it dynamically
        if (!container) {
            container = document.createElement("div");
            container.id = "jsme_container";
            container.style.width = "100%";
            container.style.height = "1000px";
            document.body.appendChild(container); // Add to the page
        }

        let width = container.clientWidth || window.innerWidth; // Use full width
        let height = 1000;  // Adjust height as needed

        new JSME("jsme_container", width, height);
    }

    window.addEventListener("load", jsmeOnLoad);  // Initialize when the page loads
    window.addEventListener("resize", jsmeOnLoad);  // Adjust on resize
</script>

</head>

<body>
<div id="jsme_container"></div>

</body>
</html>
