<html>

<head>
    <script type="text/javascript" language="javascript" src="jsme/jsme.nocache.js"></script>

   <script type="text/javascript">
    function jsmeOnLoad() {
        let container = document.getElementById("jsme_container");
        let width = container.clientWidth || window.innerWidth;  // Get full width of parent
        let height = 600;  // Adjust height as needed

        new JSME("jsme_container", width, height);
    }

    window.addEventListener("resize", jsmeOnLoad);  // Resize dynamically
</script>

</head>

<body>
<div id="jsme_container"></div>

</body>
</html>
